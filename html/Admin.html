<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Yalla Padel!</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="navbar">
        <div class="brand-text">Yallaaaaaaa Padel!</div>
        <div>
            <button class="nav-link" onclick="location.href='home.html'">Home</button>
            <button class="nav-link" onclick="location.href='padelllllll.html'">STORE</button>
            <button class="nav-link" onclick="location.href='Admin.html'" style="color: #60a5fa;">ADMIN</button>
            <div class="cart-container">
                <button class="nav-link" onclick="location.href='padelllllll.html'">🛒 CART</button>
            </div>
        </div>
    </div>

    <div class="hero">
        <h1 class="hero-title">Admin Panel</h1>
        <p class="hero-subtitle">Manage your store inventory</p>
    </div>

    <div class="container">
        <div class="admin-panel">
            <h2>Add New Product</h2>
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName" placeholder="e.g., Padel Shoes">
            </div>
            <div class="form-group">
                <label>Price (EGP)</label>
                <input type="number" id="productPrice" placeholder="e.g., 1200">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="productDesc" placeholder="Short description">
            </div>
            <div class="form-group">
                <label>Has Options (Size/Color)?</label>
                <select id="productHasOptions">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>
            <button class="btn-action" onclick="addProduct()" style="width:auto; padding:10px 20px;">+ Add Product</button>

            <div class="product-list-admin">
                <h2>Manage Existing Products</h2>
                <div id="adminProductList"></div>
            </div>
        </div>
    </div>

    <script src="../js/YallaPadel.js"></script>
    <script>
        function loadAdminProducts() {
            const container = document.getElementById('adminProductList');
            if (!container) return;
            
            const products = JSON.parse(localStorage.getItem('padelProducts') || '[]');
            if (products.length === 0) {
                container.innerHTML = '<p>No products yet.</p>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < products.length; i++) {
                const p = products[i];
                const stockText = p.inStock !== false ? 'In Stock' : 'Out of Stock';
                const outClass = p.inStock === false ? 'out-of-stock' : '';
                html += `
                    <div class="admin-product-item ${outClass}">
                        <div>
                            <strong>${p.name}</strong> - ${p.price} EGP<br>
                            <small>${p.desc || ''}</small><br>
                            <span class="stock-badge ${p.inStock === false ? 'out' : ''}">${stockText}</span>
                        </div>
                        <div class="admin-product-actions">
                            <button class="btn-edit" onclick="editProduct('${p.id}')">Edit</button>
                            <button class="btn-stock" onclick="toggleStock('${p.id}')">Mark ${p.inStock !== false ? 'Out of Stock' : 'In Stock'}</button>
                            <button class="btn-delete" onclick="deleteProduct('${p.id}')">Delete</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // Override functions to refresh admin view
        const origEdit = editProduct;
        window.editProduct = function(id) {
            origEdit(id);
            loadAdminProducts();
        };
        
        const origToggle = toggleStock;
        window.toggleStock = function(id) {
            origToggle(id);
            loadAdminProducts();
        };
        
        const origDelete = deleteProduct;
        window.deleteProduct = function(id) {
            origDelete(id);
            loadAdminProducts();
        };
        
        window.addProduct = function() {
            const origAdd = addProduct;
            origAdd();
            loadAdminProducts();
        };
        
        loadAdminProducts();
    </script>
</body>
</html>
