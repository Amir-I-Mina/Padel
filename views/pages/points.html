<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Points | Admin</title>
    <link rel="stylesheet" href="tournament_admin.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand-text">Yalla Padel</div>
        <div class="nav-links">
            <a href="tournaments.html" class="nav-link">Tournaments</a>
            <a href="points.html" class="nav-link active">Add Points</a>
            <a href="approvals.html" class="nav-link">Approvals</a>
        </div>
    </nav>
    <main class="container">
        <div class="panel" style="max-width: 500px; margin: auto;">
            <h2>Assign Points</h2>
            <label>Select Team</label>
            <select class="modal-input">
                <option>Smash Kings</option>
                <option>Net Ninjas</option>
            </select>
            <label>Point Amount</label>
            <input type="number" id="point-amount" class="modal-input" placeholder="0">
            <button class="btn-primary" style="width:100%" onclick="updatePoints()">Update Leaderboard</button>
        </div>
    </main>
    <script src="tournament_admin.js"></script>
</body>
</html>
