<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments | Admin</title>
    <link rel="stylesheet" href="tournament_admin.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand-text">Yalla Padel Admin</div>
        <div class="nav-links">
            <a href="tournaments_admin.html" class="nav-link active">Tournaments</a>
            <a href="points.html" class="nav-link">Add Points</a>
            <a href="approvals.html" class="nav-link">Approvals</a>
        </div>
    </nav>
    <main class="container">
        <div class="panel">
            <h2>Tournament Management</h2>
            <table class="admin-table">
                <thead>
                    <tr><th>Tournament</th><th>Status</th><th>Registrations</th><th>Actions</th></tr>
                </thead>
                <tbody id="tournament-list">
                    <tr id="row-1">
                        <td><strong id="name-1">Spring Doubles</strong></td>
                        <td><span class="badge closed" id="status-1">CLOSED</span></td>
                        <td><button class="btn-edit" id="reg-btn-1" onclick="toggleReg(1)">Open</button></td>
                        <td>
                            <div class="btn-group">
                                <button class="btn-edit" onclick="editName(1)">Edit</button>
                                <button class="btn-primary" onclick="window.location.href='tree_editor.html'">Edit Tree</button>
                                <button class="btn-danger" onclick="deleteItem('row-1')">Remove</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <script src="tournament_admin.js"></script>
</body>
</html>
