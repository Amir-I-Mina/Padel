<!DOCTYPE html>
<html lang="en">
<head>

    <title>Approvals | Admin</title>
    <link rel="stylesheet" href="tournament_admin.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand-text">Yalla Padel</div>
        <div class="nav-links">
            <a href="tournaments_admin.html" class="nav-link">Tournaments</a>
            <a href="points.html" class="nav-link">Add Points</a>
            <a href="approvals.html" class="nav-link active">Approvals</a>
        </div>
    </nav>
    <main class="container">
        <h2>Pending Registrations</h2>
        <div class="approval-card">
            <span class="badge open">Spring Cup</span>

            </div>
        </div>
    </main>
    <script src="tournament_admin.js"></script>
