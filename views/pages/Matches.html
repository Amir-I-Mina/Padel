<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches | Yalla Padel</title>
    <link rel="stylesheet" href="bishoy.css">
    <link rel="stylesheet" href="matches.css">
</head>
<body>

    <nav class="navbar">
        <div class="brand-text">Yalla Padel</div>
        <div class="nav-links">
            <a href="home.html" class="nav-link">Home</a>
            <a href="tormenint.html" class="nav-link">Tournaments</a>
            <a href="Matches.html" class="nav-link" style="color: #3b82f6;">Matches</a>
            <a href="leaderboard.html" class="nav-link">Leaderboard</a>
        </div>
    </nav>

    <div class="container" style="padding-top: 50px;">
        <h2 style="text-align: center; margin-bottom: 30px;">Tournament Hub</h2>
        
        <div style="display:flex; justify-content:center; gap:15px; margin-bottom:40px;">
            <button class="tab-btn" onclick="showStage('groups')">Group Stage</button>
            <button class="tab-btn" onclick="showStage('knockouts')">Knockout Bracket</button>
        </div>

        <div id="groups-view" style="display: none;">
            <h3 style="text-align: center;">Group Stage Standings</h3>
            <table style="width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <thead>
                    <tr style="background-color: #0f172a; color: white;">
                        <th style="padding: 15px; text-align: left;">Team</th>
                        <th style="padding: 15px; text-align: center;">Played</th>
                        <th style="padding: 15px; text-align: center;">Wins</th>
                        <th style="padding: 15px; text-align: center;">Points</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="border-bottom: 1px solid #e2e8f0;"><td style="padding: 15px;">Smash Kings</td><td style="padding: 15px; text-align: center;">3</td><td style="padding: 15px; text-align: center;">3</td><td style="padding: 15px; text-align: center; font-weight: bold; color: #3b82f6;">9</td></tr>
                    <tr style="border-bottom: 1px solid #e2e8f0;"><td style="padding: 15px;">Net Ninjas</td><td style="padding: 15px; text-align: center;">3</td><td style="padding: 15px; text-align: center;">2</td><td style="padding: 15px; text-align: center; font-weight: bold; color: #3b82f6;">6</td></tr>
                    <tr style="border-bottom: 1px solid #e2e8f0;"><td style="padding: 15px;">Padel Pros</td><td style="padding: 15px; text-align: center;">3</td><td style="padding: 15px; text-align: center;">1</td><td style="padding: 15px; text-align: center; font-weight: bold; color: #3b82f6;">3</td></tr>
                    <tr><td style="padding: 15px;">Court Masters</td><td style="padding: 15px; text-align: center;">3</td><td style="padding: 15px; text-align: center;">0</td><td style="padding: 15px; text-align: center; font-weight: bold; color: #3b82f6;">0</td></tr>
                </tbody>
            </table>
        </div>

        <div id="knockouts-view">
            <div class="bracket-wrapper">
                <div class="final-match">
                    <h4 style="margin:5px; color:#f59e0b;">GRAND FINAL</h4>
                    <div class="match-box">
                        <div class="team-name winner">Smash Kings <span class="score">Winner</span></div>
                        <div class="vs-text">VS</div>
                        <div class="team-name loser">Net Ninjas <span class="score">Lost</span></div>
                    </div>
                </div>
                <div class="bracket-connector"></div>
                <div class="bracket-container">
                    <div class="match-box">
                        <div class="team-name winner">Smash Kings <span class="score">Won</span></div>
                        <div class="vs-text">VS</div>
                        <div class="team-name loser">Padel Pros <span class="score">Lost</span></div>
                    </div>
                    <div class="match-box">
                        <div class="team-name winner">Net Ninjas <span class="score">Won</span></div>
                        <div class="vs-text">VS</div>
                        <div class="team-name loser">Court Masters <span class="score">Lost</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showStage(stage) {
            document.getElementById('groups-view').style.display = (stage === 'groups') ? 'block' : 'none';
            document.getElementById('knockouts-view').style.display = (stage === 'knockouts') ? 'block' : 'none';
        }
    </script>
</body>
</html>
