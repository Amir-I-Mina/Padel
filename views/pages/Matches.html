<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches | Padel Hub</title>
    <link rel="stylesheet" href="../CSS/bishoy.css">
    <link rel="stylesheet" href="../CSS/matches.css">
</head>
<body>

    <nav class="navbar">
        <div class="brand-text">Yalla Padel</div>
        <div class="nav-links">
            <a href="home.html" class="nav-link">Home</a>
            <a href="tormenint.html" class="nav-link">Tournaments</a>
            <a href="Matches.html" class="nav-link">Matches</a>
            <a href="leaderboard.html" class="nav-link">Leaderboard</a>
        </div>
    </nav>

    <div class="container" style="padding-top: 50px;">
        <h2 style="text-align: center; text-transform: uppercase; margin-bottom: 30px;">Current Matchups</h2>
        
        <div class="match-fixture">
            <div class="match-header">
                <div class="team-container">
                    <div class="team-name">Smash Kings</div>
                    <div class="form-dots">
                        <span class="dot win"></span><span class="dot win"></span><span class="dot loss"></span><span class="dot win"></span><span class="dot win"></span>
                    </div>
                </div>
                
                <div class="vs-badge">VS</div>
                
                <div class="team-container">
                    <div class="team-name">Net Ninjas</div>
                    <div class="form-dots">
                        <span class="dot loss"></span><span class="dot loss"></span><span class="dot win"></span><span class="dot loss"></span><span class="dot loss"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="match-fixture">
            <div class="match-header">
                <div class="team-container">
                    <div class="team-name">Padel Pros</div>
                    <div class="form-dots">
                        <span class="dot win"></span><span class="dot win"></span><span class="dot win"></span><span class="dot empty"></span><span class="dot empty"></span>
                    </div>
                </div>
                
                <div class="vs-badge">VS</div>
                
                <div class="team-container">
                    <div class="team-name">Court Crushers</div>
                    <div class="form-dots">
                        <span class="dot loss"></span><span class="dot win"></span><span class="dot loss"></span><span class="dot empty"></span><span class="dot empty"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
