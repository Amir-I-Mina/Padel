<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Tree | Admin</title>
    <link rel="stylesheet" href="tournament_admin.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand-text">Yalla Padel - Bracket Editor</div>
        <a href="tournaments_admin.html" class="nav-link" style="color:white;">← Back to Tournaments</a>
    </nav>

    <main class="container">
        <div class="panel">
            <h2>Match Outcomes</h2>
            <div id="match-container" style="margin-top:20px;">
                <div class="match-row" style="display:flex; gap:20px; padding:15px; border-bottom:1px solid #f1f5f9; align-items:center;">
                    <span style="min-width:150px;"><strong>Match #1:</strong> Ahmed vs Omar</span>
                    <select class="modal-input" style="flex-grow:1;">
                        <option>Ahmed (Winner)</option>
                        <option>Omar (Winner)</option>
                    </select>
                    <button class="btn-primary" onclick="saveMatch(1)">Update</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function saveMatch(matchId) {
            alert("Match #" + matchId + " result saved to the tournament tree!");
        }
    </script>
</body>
</html>
